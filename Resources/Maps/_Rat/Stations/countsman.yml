        [head=3]Имперское инженерное предписание[/head]


        [bold]По воле Трона[/bold]


        В этом помещении хранятся резервные компоненты антиматериального двигателя, дарованные Империи древним и благородным Домом Вогсбург. Эти детали не должны быть растрачены или использованы без необходимости.


        Если бедствие постигнет «Каунтсман» и сердце его инженерного отсека будет утрачено, находящиеся здесь материалы должны быть использованы верными инженерами для восстановления двигателя и возвращения судна к полной боевой мощи.


        Пусть каждый, кто служит на этом корабле, запомнит:

        АМД — это жизненная сила судна. Его потеря по небрежности или из-за действий врага станет позором для экипажа и бесчестьем для Империи.


        Будьте бдительны. Охраняйте двигатель.


        Ни при каких обстоятельствах врагу нельзя позволить взорвать АМД.
