- type: entity
  id: ComputerIntredyneLifeInsurance
  parent: [BaseStructureDisableToolUse, BaseStructureIndestructible, BaseStructureComputer]
  name: консоль страхования Interdyne
  description: Управление страховкой жизни людей. Позволяет удаленно ускорить создание клона, обойдя ограничение на количество должностей на станции клиента.
  placement:
    mode: SnapgridCenter
  components:
  - type: MeleeSound
    soundGroups:
      Brute:
        collection: MetalGlassBreak
  - type: ApcPowerReceiver
    powerLoad: 200
  - type: ExtensionCableReceiver
  - type: ActivatableUIRequiresPower
  - type: AccessReader
    access: [["SyndicateInterdyne"]]
  - type: ActivatableUIRequiresAccess
    popupMessage: life-insurance-popup-access-denied
  - type: Sprite
    netsync: false
    noRot: true
    sprite: Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: tcboss
    - map: ["computerLayerKeys"]
      state: tech_key
  - type: ActivatableUI
    key: enum.LifeInsuranceUiKey.Key
  - type: UserInterface
    interfaces:
      enum.LifeInsuranceUiKey.Key:
        type: LifeInsuranceBoundUserInterface
  - type: LifeInsuranceConsole
  - type: MaterialStorage
    materialWhiteList:
    - ExoticProteins
    storageLimit: 100000
  - type: LitOnPowered
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#b89f25"
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    offset: "0, 0.4"
    castShadows: false
#  - type: WirelessNetworkConnection
#    range: 200
  - type: DeviceLinkSource
    range: 200
    ports:
      - OrderSender
