- type: noiseChannel
  id: RatDensityMax
  noiseType: Perlin
  fractalLacunarityByPi: 0.666666666
  remapTo0Through1: true
  clippingRanges:
    - 0.01, 0.99
  clippedValue: 2 # magic number for chunk size.
  inputMultiplier: 6 # Makes density hopefully low noise in the local area while still being interesting at scale.
  outputMultiplier: 50.0 # We scale density up significantly for more human-friendly numbers.
  minimum: 0.98

- type: noiseChannel
  id: RatDensityMin
  noiseType: Perlin
  fractalLacunarityByPi: 0.666666666
  remapTo0Through1: true
  clippingRanges:
    - 0.01, 0.99
  clippedValue: 2
  inputMultiplier: 6
  outputMultiplier: 50.0
  minimum: 0.98

- type: noiseChannel
  id: RatCarver
  noiseType: Perlin
  fractalLacunarityByPi: 0.666666666
  remapTo0Through1: true
  inputMultiplier: 10